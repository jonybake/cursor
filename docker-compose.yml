version: '3.8'

services:
  # Redis服务
  redis:
    image: redis:6.2-alpine
    container_name: rocketmq-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # RocketMQ NameServer
  rocketmq-nameserver:
    image: apache/rocketmq:4.9.4
    container_name: rocketmq-nameserver
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    environment:
      - JAVA_OPT_EXT=-Xms512M -Xmx512M -Xmn128m

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:4.9.4
    container_name: rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    command: sh mqbroker -n rocketmq-nameserver:9876
    environment:
      - JAVA_OPT_EXT=-Xms512M -Xmx512M -Xmn128m
    depends_on:
      - rocketmq-nameserver

volumes:
  redis_data: