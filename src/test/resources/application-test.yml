server:
  port: 8081

spring:
  redis:
    host: localhost
    port: 6379
    database: 1  # 使用不同的数据库进行测试

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: test-producer-group
  consumer:
    group: test-consumer-group

logging:
  level:
    com.example.rocketmq: DEBUG
    org.apache.rocketmq: WARN