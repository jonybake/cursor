server:
  port: 8080

spring:
  application:
    name: rocketmq-deduplication
  
  # Redis配置（用于消息去重）
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# RocketMQ配置
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: dedup-producer-group
  consumer:
    group: dedup-consumer-group
    topics: ORDER_TOPIC,PAYMENT_TOPIC,USER_TOPIC,TEST_TOPIC

# 日志配置
logging:
  level:
    com.example.rocketmq: DEBUG
    org.apache.rocketmq: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"