<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH数据分析仪表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.9em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .exchange-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .exchange-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .exchange-name {
            font-weight: bold;
            color: #333;
        }

        .exchange-volume {
            color: #666;
            font-size: 0.9em;
        }

        .prediction-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .prediction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .prediction-card {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .prediction-date {
            font-size: 0.9em;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .prediction-price {
            font-size: 1.2em;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 ETH数据分析仪表板</h1>
            <p>以太坊交易量分析与价格预测 (2024年9月)</p>
        </div>

        <div id="loading" class="loading">
            <p>正在加载数据...</p>
        </div>

        <div id="dashboard" style="display: none;">
            <!-- 统计概览 -->
            <div class="stats-grid" id="statsGrid">
                <!-- 动态生成统计卡片 -->
            </div>

            <!-- 主要仪表板 -->
            <div class="dashboard">
                <!-- K线图 -->
                <div class="card">
                    <h2>📈 ETH价格走势与K线图</h2>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>

                <!-- 交易所交易量 -->
                <div class="card">
                    <h2>🏛️ 各大交易所交易量</h2>
                    <div class="chart-container">
                        <canvas id="volumeChart"></canvas>
                    </div>
                    <div class="exchange-list" id="exchangeList">
                        <!-- 动态生成交易所列表 -->
                    </div>
                </div>
            </div>

            <!-- 预测结果 -->
            <div class="prediction-section">
                <h2>🔮 未来6天价格预测 (9月23-28日)</h2>
                <div class="prediction-grid" id="predictionGrid">
                    <!-- 动态生成预测卡片 -->
                </div>
            </div>
        </div>

        <div id="error" class="error" style="display: none;">
            <p>数据加载失败，请刷新页面重试</p>
        </div>
    </div>

    <script>
        let allData = null;

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('/api/data');
                if (!response.ok) throw new Error('数据加载失败');
                allData = await response.json();
                renderDashboard();
            } catch (error) {
                console.error('加载数据失败:', error);
                showError();
            }
        }

        // 显示错误
        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        // 渲染仪表板
        function renderDashboard() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            renderStats();
            renderPriceChart();
            renderVolumeChart();
            renderExchangeList();
            renderPredictions();
        }

        // 渲染统计概览
        function renderStats() {
            const stats = allData.summary;
            const statsGrid = document.getElementById('statsGrid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <h3>历史交易总量</h3>
                    <div class="value">$${(stats.total_historical_volume / 1e12).toFixed(2)}T</div>
                </div>
                <div class="stat-card">
                    <h3>平均日交易量</h3>
                    <div class="value">$${(stats.avg_daily_volume / 1e9).toFixed(1)}B</div>
                </div>
                <div class="stat-card">
                    <h3>最低价格</h3>
                    <div class="value">$${stats.price_range.min.toFixed(0)}</div>
                </div>
                <div class="stat-card">
                    <h3>最高价格</h3>
                    <div class="value">$${stats.price_range.max.toFixed(0)}</div>
                </div>
                <div class="stat-card">
                    <h3>预测趋势</h3>
                    <div class="value">${stats.predicted_trend === '上涨' ? '📈' : '📉'} ${stats.predicted_trend}</div>
                </div>
            `;
        }

        // 渲染价格K线图
        function renderPriceChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const historicalData = allData.historical_kline;
            const futureData = allData.future_kline;

            const allDates = [...historicalData.map(d => d.date), ...futureData.map(d => d.date)];
            const historicalPrices = historicalData.map(d => d.close);
            const futurePrices = futureData.map(d => d.close);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allDates,
                    datasets: [
                        {
                            label: '历史价格',
                            data: [...historicalPrices, ...new Array(futurePrices.length).fill(null)],
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '预测价格',
                            data: [...new Array(historicalPrices.length).fill(null), ...futurePrices],
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            borderDash: [5, 5],
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(0);
                                }
                            }
                        },
                        x: {
                            ticks: {
                                maxTicksLimit: 10
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': $' + context.parsed.y.toFixed(2);
                                }
                            }
                        }
                    }
                }
            });
        }

        // 渲染交易量图表
        function renderVolumeChart() {
            const ctx = document.getElementById('volumeChart').getContext('2d');
            const exchanges = allData.exchange_volumes;

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: exchanges.map(e => e.name),
                    datasets: [{
                        data: exchanges.map(e => e.market_share),
                        backgroundColor: [
                            '#667eea', '#764ba2', '#f093fb', '#f5576c',
                            '#4facfe', '#00f2fe', '#43e97b', '#38f9d7'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const exchange = exchanges[context.dataIndex];
                                    return exchange.name + ': ' + exchange.market_share.toFixed(1) + '%';
                                }
                            }
                        }
                    }
                }
            });
        }

        // 渲染交易所列表
        function renderExchangeList() {
            const exchangeList = document.getElementById('exchangeList');
            const exchanges = allData.exchange_volumes;

            exchangeList.innerHTML = exchanges.map(exchange => `
                <div class="exchange-item">
                    <div class="exchange-name">${exchange.name}</div>
                    <div class="exchange-volume">$${(exchange.volume / 1e9).toFixed(1)}B</div>
                </div>
            `).join('');
        }

        // 渲染预测结果
        function renderPredictions() {
            const predictionGrid = document.getElementById('predictionGrid');
            const predictions = allData.future_kline;

            predictionGrid.innerHTML = predictions.map(pred => `
                <div class="prediction-card">
                    <div class="prediction-date">${pred.date}</div>
                    <div class="prediction-price">$${pred.close.toFixed(0)}</div>
                    <div style="font-size: 0.8em; margin-top: 5px;">
                        开盘: $${pred.open.toFixed(0)}<br>
                        最高: $${pred.high.toFixed(0)}<br>
                        最低: $${pred.low.toFixed(0)}
                    </div>
                </div>
            `).join('');
        }

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
